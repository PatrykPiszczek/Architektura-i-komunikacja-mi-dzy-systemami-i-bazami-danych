services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spendsync
      POSTGRES_PASSWORD: spendsync
      POSTGRES_DB: spendsync
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendsync"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://spendsync:spendsync@db:5432/spendsync
      JWT_SECRET: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
